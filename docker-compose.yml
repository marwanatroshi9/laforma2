services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arch}
      POSTGRES_DB: ${POSTGRES_DB:-arch_platform}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No host port — the database is only reached internally by the backend
    # over the Docker network. Keeps Postgres off the public internet and
    # avoids clashing with a host Postgres (e.g. Dokploy's).
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-arch}:${POSTGRES_PASSWORD:-arch}@db:5432/${POSTGRES_DB:-arch_platform}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL:-admin@studio.com}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD:-admin1234}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@studio.com}
      SMTP_TLS: ${SMTP_TLS:-true}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
    volumes:
      - media:/app/media
    # Internal only — the frontend proxies /api and /media to it over the
    # Docker network, so it never needs a public host port.
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${NEXT_PUBLIC_PLAUSIBLE_DOMAIN:-}
      NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
    ports:
      # Host port is configurable so it never clashes with other software
      # (e.g. Dokploy/Coolify, which use 3000). Defaults to 3000.
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  pgdata:
  media:
